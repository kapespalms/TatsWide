  <rect x="18" y="158" width="54" height="23" class="stripe" transform="rotate(-25 18 158)"/><rect x="7" y="210" width="61" height="22" class="stripe" transform="rotate(-13 7 210)"/>
  <rect x="304" y="162" width="62" height="23" class="stripe" transform="rotate(25 304 162)"/><rect x="324" y="214" width="55" height="22" class="stripe" transform="rotate(16 324 214)"/>
  <!-- left hand pocket and thumbs up -->
  <path class="skin ink" d="M280 227 C315 236 342 248 365 280 C357 298 337 307 322 292 C300 270 282 258 262 252z"/>
  <path class="skin ink" d="M320 292 c18 18 45 12 51-12"/>
  <path class="skin ink" d="M20 270 C-18 238-22 185 14 142 C34 165 44 198 50 235z"/>
  <path class="skin ink" d="M-1 142 c-10-30 12-62 40-50 c12 9 9 33-11 46z"/>
  <path class="skin ink" d="M23 88 c25 8 30 40 13 60"/>
  <!-- head -->
  <circle class="skin ink" cx="175" cy="78" r="78"/>
  <path class="skin ink" d="M115 70 L65 88 L112 112"/>
  <path class="skin ink" d="M235 70 L285 88 L238 112"/>
  <path class="skin ink" d="M124 18 C110-36 93-14 91 35"/>
  <path class="skin ink" d="M226 18 C244-36 262-14 258 35"/>
  <!-- waldo hat -->
  <path d="M95 38 C120-42 230-42 255 38 C205 20 145 20 95 38z" fill="#fff7e5" stroke="#050505" stroke-width="7"/>
  <path d="M115 26 C150 8 200 8 235 26" fill="none" stroke="#ef351f" stroke-width="22"/>
  <circle cx="257" cy="0" r="23" fill="#ef351f" stroke="#050505" stroke-width="5"/>
  <!-- face -->
  <circle cx="145" cy="78" r="18" fill="#fff" stroke="#050505" stroke-width="5"/><circle cx="205" cy="78" r="18" fill="#fff" stroke="#050505" stroke-width="5"/><circle cx="148" cy="80" r="8" fill="#050505"/><circle cx="208" cy="80" r="8" fill="#050505"/>
  <circle cx="145" cy="78" r="30" fill="none" stroke="#d7aa4a" stroke-width="6"/><circle cx="205" cy="78" r="30" fill="none" stroke="#d7aa4a" stroke-width="6"/><line x1="175" y1="78" x2="176" y2="78" stroke="#d7aa4a" stroke-width="6"/>
  <path d="M145 117 q30 30 62 0" fill="none" stroke="#050505" stroke-width="7"/>
