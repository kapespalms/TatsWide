<!-- bottom feature bar -->
<rect y="815" width="1600" height="85" fill="#050505" opacity=".96"/>
<g class="cream small">
  <text x="170" y="850" class="body cream" style="font-size:20px">🏆 EPIC BATTLES</text><text x="170" y="878" font-size="16">Face off in wild challenges.</text>
  <line x1="405" y1="830" x2="405" y2="885" stroke="#fff1d6" opacity=".35"/>
  <text x="525" y="850" class="body cream" style="font-size:20px">👑 CLIMB THE RANKS</text><text x="525" y="878" font-size="16">Prove you're the ultimate legend.</text>
  <line x1="790" y1="830" x2="790" y2="885" stroke="#fff1d6" opacity=".35"/>
  <text x="910" y="850" class="body cream" style="font-size:20px">🔥 EARN GLORY</text><text x="910" y="878" font-size="16">Unlock rewards and bragging rights.</text>
  <line x1="1190" y1="830" x2="1190" y2="885" stroke="#fff1d6" opacity=".35"/>
  <text x="1280" y="850" class="body cream" style="font-size:20px">⚡ JOIN THE ARENA</text><text x="1280" y="878" font-size="16">Step in. Stand out. Be remembered.</text>
</g>

<!-- decorative sparks -->
<g filter="url(#glow)">
  <path class="spark" d="M320 145 l12 28 28 12-28 12-12 28-12-28-28-12 28-12z"/>
  <path class="spark" d="M1160 185 l10 24 24 10-24 10-10 24-10-24-24-10 24-10z"/>
