<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
<title id="title">Tats and Wideass Ultimate Showdown Arena website hero</title>
<desc id="desc">A vector website hero banner with a tattooed devil romper girl on the left and a devil Where's Waldo inspired boy on the right in an arena showdown.</desc>
<defs>
  <linearGradient id="bg" x1="0" x2="1" y1="0" y2="0">
    <stop offset="0" stop-color="#090606"/>
    <stop offset="0.48" stop-color="#1a0906"/>
    <stop offset="0.52" stop-color="#08080b"/>
    <stop offset="1" stop-color="#06101d"/>
  </linearGradient>
  <linearGradient id="redBurst" x1="0" x2="1"><stop offset="0" stop-color="#ff3b1f"/><stop offset="1" stop-color="#8b1008"/></linearGradient>
  <linearGradient id="blueBurst" x1="0" x2="1"><stop offset="0" stop-color="#0b2b55"/><stop offset="1" stop-color="#05070a"/></linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="8" stdDeviation="7" flood-color="#000" flood-opacity=".75"/></filter>
  <filter id="glow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <pattern id="halftone" width="16" height="16" patternUnits="userSpaceOnUse"><circle cx="3" cy="3" r="1.6" fill="#f5e7cf" opacity=".18"/></pattern>
  <style>
    .cream{fill:#fff1d6}.red{fill:#ef351f}.dark{fill:#050505}.ink{stroke:#050505;stroke-width:7;stroke-linecap:round;stroke-linejoin:round}.thin{stroke:#050505;stroke-width:3;stroke-linecap:round;stroke-linejoin:round}.whiteStroke{stroke:#fff1d6;stroke-width:6;stroke-linejoin:round}.nav{font:700 22px Arial, sans-serif;letter-spacing:1px}.small{font:700 18px Arial, sans-serif;letter-spacing:.7px}.body{font:800 30px Arial, sans-serif;letter-spacing:1px}.title{font:900 118px Arial Black, Impact, sans-serif;letter-spacing:-5px}.script{font:900 92px Arial Black, Impact, sans-serif;font-style:italic;letter-spacing:-4px}.tag{font:900 42px Arial Black, Impact, sans-serif}.button{font:900 20px Arial Black, sans-serif;letter-spacing:1px}.tat{fill:none;stroke:#080808;stroke-width:2.6;stroke-linecap:round;stroke-linejoin:round}.stripe{fill:#ef351f}.sock{fill:#fff7e5}.skin{fill:#f23a21}.shoe{fill:#9d5b24}.sole{fill:#3a1c09}.denim{fill:#77a6ca}.black{fill:#0b0b0c}.gold{fill:#f4b037}.spark{fill:#f8b83e}
  </style>
</defs>

<rect width="1600" height="900" fill="url(#bg)"/>
<rect y="88" width="800" height="710" fill="url(#redBurst)" opacity=".22"/>
<rect x="800" y="88" width="800" height="710" fill="url(#blueBurst)" opacity=".52"/>
<rect width="1600" height="900" fill="url(#halftone)"/>

<!-- top nav -->
<rect width="1600" height="92" fill="#030303" opacity=".96"/>
<text x="38" y="57" class="script red">Tats</text><text x="205" y="57" class="script cream" style="font-size:54px"> &amp; Wideass</text>
<text x="500" y="55" class="nav red">ARENA</text><line x1="500" y1="73" x2="575" y2="73" stroke="#ef351f" stroke-width="4"/>
<text x="645" y="55" class="nav cream">RANKINGS</text><text x="805" y="55" class="nav cream">CHALLENGES</text><text x="985" y="55" class="nav cream">ABOUT</text>
<rect x="1290" y="22" rx="26" ry="26" width="250" height="50" fill="none" stroke="#ef351f" stroke-width="3"/>
<text x="1344" y="55" class="button cream">ENTER ARENA 🔥</text>

<!-- arena floor -->
<ellipse cx="800" cy="815" rx="760" ry="120" fill="#030303" opacity=".55"/>
<path d="M35 800 C280 700 540 680 790 800 C1010 690 1320 700 1565 800 L1565 830 L35 830Z" fill="#111" opacity=".85"/>
<path d="M40 800 C280 705 535 690 790 800" fill="none" stroke="#ef351f" stroke-width="5" opacity=".65"/>
<path d="M810 800 C1030 705 1320 705 1560 800" fill="none" stroke="#4eb2ff" stroke-width="5" opacity=".55"/>

<!-- banners -->
<path d="M72 170 h95 v210 l-47-42-48 42z" fill="#ab1d14" stroke="#ef351f" stroke-width="4" opacity=".8"/>
<path d="M1428 170 h95 v210 l-47-42-48 42z" fill="#e9e1d0" stroke="#111" stroke-width="4" opacity=".85"/>
<text x="100" y="292" class="tag dark">🔥</text><text x="1458" y="292" class="tag dark">🔍</text>

<!-- explosion behind title -->
<path d="M467 270 L610 245 L540 170 L682 230 L715 115 L760 240 L885 150 L830 260 L1015 210 L875 305 L1056 345 L852 362 L930 493 L795 390 L700 515 L720 380 L535 450 L645 345 Z" fill="#fff1d6" opacity=".93" filter="url(#shadow)"/>
<path d="M515 260 L652 250 L610 170 L720 232 L765 135 L795 250 L900 190 L865 275 L1010 250 L890 318 L990 362 L855 358 L925 462 L790 385 L715 490 L720 365 L575 420 L660 335 Z" fill="#ef351f" opacity=".72"/>

<!-- center typography -->
<g filter="url(#shadow)">
<text x="505" y="295" class="title red" transform="rotate(-6 505 295)">Tats</text>
<text x="805" y="325" class="title cream" style="font-size:82px">&amp;</text>
<text x="515" y="425" class="title cream" transform="rotate(-3 515 425)">Wideass</text>
<path d="M518 470 h570 l-28 95 h-575 z" fill="#050505" stroke="#fff1d6" stroke-width="5"/>
<text x="590" y="530" class="tag red">ULTIMATE</text>
<text x="565" y="576" class="tag cream">SHOWDOWN ARENA</text>
<text x="585" y="642" class="body cream" style="font-size:26px">TWO LEGENDS. <tspan fill="#ef351f">ONE ARENA.</tspan></text>
<text x="530" y="680" class="body cream" style="font-size:25px">ONLY ONE CAN CLAIM THE CROWN.</text>
<text x="728" y="785" class="title red" style="font-size:95px">V</text><text x="805" y="785" class="title cream" style="font-size:95px">S</text>
</g>

<!-- left info card -->
<g filter="url(#shadow)">
<path d="M20 590 h210 l25 35 v165 l-25 35 h-210z" fill="#070707" stroke="#ef351f" stroke-width="3"/>
<text x="45" y="650" class="body red" style="font-size:24px">INKED.</text><text x="45" y="690" class="body red" style="font-size:24px">ICONIC.</text><text x="45" y="730" class="body red" style="font-size:24px">UNAPOLOGETIC.</text>
<rect x="44" y="765" width="150" height="48" rx="8" fill="none" stroke="#ef351f" stroke-width="3"/><text x="62" y="797" class="button red">VIEW STATS →</text>
</g>
<g filter="url(#shadow)">
<path d="M1335 595 h230 v190 h-230 l-25-35 v-120z" fill="#050505" stroke="#4eb2ff" stroke-width="3"/>
<text x="1390" y="650" class="body cream" style="font-size:24px">HARD TO FIND.</text><text x="1370" y="690" class="body cream" style="font-size:24px">IMPOSSIBLE TO</text><text x="1424" y="730" class="body cream" style="font-size:24px">IGNORE.</text>
<rect x="1360" y="755" width="165" height="48" rx="8" fill="none" stroke="#4eb2ff" stroke-width="3"/><text x="1380" y="787" class="button" fill="#4eb2ff">VIEW STATS →</text>
</g>

<!-- character: Tats, romper devil girl -->
