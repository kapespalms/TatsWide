  <path d="M78 444 l-58 24 26-58z" fill="#e8321f" class="thin"/>
  <!-- legs -->
  <path class="skin ink" d="M205 515 C185 610 182 682 178 760 h70 C250 675 260 590 290 520z"/>
  <path class="skin ink" d="M330 510 C355 605 376 680 410 760 h72 C445 662 420 590 385 510z"/>
  <!-- bare lower feet, no socks -->
  <path class="skin ink" d="M176 756 c25 12 60 12 78 0 l10 28 c-38 16-72 14-102-2z"/>
  <path class="skin ink" d="M411 754 c22 15 48 15 72 1 l14 25 c-32 20-65 20-99 3z"/>
  <!-- one birk on left foot -->
  <g transform="translate(145,748)">
    <path class="shoe ink" d="M0 25 C34 8 87 15 110 42 C90 70 32 70 4 48z"/>
    <path class="sole" d="M5 48 C35 62 88 60 108 42 L112 56 C82 82 24 77 0 55z"/>
    <rect x="15" y="24" width="38" height="22" rx="4" fill="#b77736" stroke="#3a1c09" stroke-width="3"/>
    <rect x="58" y="25" width="38" height="20" rx="4" fill="#b77736" stroke="#3a1c09" stroke-width="3"/>
  </g>
  <!-- other birk off on floor next to her -->
  <g transform="translate(380,725) rotate(-5)">
    <path class="shoe ink" d="M0 25 C36 5 98 12 125 42 C104 72 38 72 5 50z"/>
    <path class="sole" d="M4 50 C38 68 101 64 124 42 L128 58 C92 82 31 80 0 58z"/>
    <rect x="24" y="22" width="39" height="22" rx="4" fill="#b77736" stroke="#3a1c09" stroke-width="3"/>
    <rect x="70" y="23" width="39" height="21" rx="4" fill="#b77736" stroke="#3a1c09" stroke-width="3"/>
  </g>
  <!-- romper -->
  <path class="black ink" d="M205 260 h190 c30 82 25 160 10 255 H180 c-18-94-8-178 25-255z"/>
  <path class="black ink" d="M225 210 h145 c28 35 40 70 43 112 H188 c4-45 14-78 37-112z"/>
  <path d="M225 210 l-45-92" stroke="#0b0b0c" stroke-width="22" stroke-linecap="round"/><path d="M370 210 l35-92" stroke="#0b0b0c" stroke-width="22" stroke-linecap="round"/>
  <line x1="206" y1="350" x2="405" y2="350" stroke="#252525" stroke-width="8"/>
  <!-- arms -->
  <path class="skin ink" d="M190 235 C125 275 105 360 94 440 C126 450 154 440 164 410 C172 355 194 320 226 292z"/>
  <path class="skin ink" d="M395 232 C458 250 505 310 528 365 C506 382 482 380 466 356 C450 325 420 300 385 285z"/>
  <path class="skin ink" d="M485 355 c22-10 50 8 43 35 c-12 22-44 24-58 5z"/>
  <!-- hand hip -->
  <path class="skin thin" d="M122 440 c36-18 68-31 100-42"/>
  <!-- head -->
  <circle class="skin ink" cx="300" cy="110" r="96"/>
  <path class="skin ink" d="M223 92 L165 112 L220 135"/>
  <path class="skin ink" d="M377 92 L435 112 L380 136"/>
  <path class="skin ink" d="M242 28 C222-32 202-15 198 42"/>
  <path class="skin ink" d="M355 28 C378-32 398-15 398 42"/>
  <path d="M258 112 q25-25 55 0" fill="none" stroke="#050505" stroke-width="7"/>
  <path d="M325 114 q22-21 48 0" fill="none" stroke="#050505" stroke-width="7"/>
  <path d="M292 148 q25 20 52 0" fill="none" stroke="#050505" stroke-width="5"/>
  <!-- sunglasses -->
  <ellipse cx="258" cy="111" rx="43" ry="24" fill="#050505" stroke="#6b441b" stroke-width="5"/>
  <ellipse cx="350" cy="111" rx="43" ry="24" fill="#050505" stroke="#6b441b" stroke-width="5"/>
  <line x1="300" y1="110" x2="308" y2="110" stroke="#6b441b" stroke-width="5"/>
  <!-- tattoos on arms/legs -->
  <g>
    <circle class="tat" cx="140" cy="315" r="16"/><path class="tat" d="M130 315 h20 M140 305 v20"/>
    <path class="tat" d="M118 370 q22-30 45 0 q-18 20-45 0z"/><path class="tat" d="M148 250 l15 18 l-20 0z"/>
    <path class="tat" d="M440 270 c20 20 12 55-20 60 c24-22 25-40 0-58"/><circle class="tat" cx="466" cy="335" r="14"/>
    <circle class="tat" cx="225" cy="610" r="25"/><path class="tat" d="M202 610 h46 M225 587 v46"/>
    <path class="tat" d="M217 690 q28-34 60 0 q-28 28-60 0z"/><text x="228" y="695" font-size="13" font-weight="900" fill="#050505">NO</text>
    <path class="tat" d="M372 590 c44 26 2 70 35 98 c-52-22-10-65-35-98z"/><circle class="tat" cx="410" cy="548" r="22"/>
    <path class="tat" d="M430 675 q-22 18-43 0 q20-20 43 0z"/>
    <path class="tat" d="M330 183 q15-22 31 0 q-15 18-31 0z"/>
  </g>
</g>

<!-- character: Wideass, devil Waldo boy -->
<g transform="translate(1125,126)" filter="url(#shadow)">
  <!-- tail -->
  <path d="M250 425 C370 460 330 560 230 535" fill="none" stroke="#e8321f" stroke-width="18" stroke-linecap="round"/>
  <path d="M345 420 l55 20-45 38z" fill="#e8321f" class="thin"/>
  <!-- legs straight -->
  <path class="skin ink" d="M95 430 h62 l-8 250 h-58z"/>
  <path class="skin ink" d="M205 430 h62 l20 250 h-58z"/>
  <!-- socks -->
  <path class="sock ink" d="M91 642 h58 v68 h-58z"/><rect x="92" y="654" width="56" height="8" class="stripe"/><rect x="92" y="671" width="56" height="8" class="stripe"/>
  <path class="sock ink" d="M227 642 h60 v68 h-60z"/><rect x="228" y="654" width="58" height="8" class="stripe"/><rect x="228" y="671" width="58" height="8" class="stripe"/>
  <!-- birks -->
  <g transform="translate(65,690)"><path class="shoe ink" d="M0 25 C34 8 88 14 112 42 C92 70 30 72 4 50z"/><path class="sole" d="M4 50 C32 64 90 62 112 42 L116 58 C84 82 24 80 0 57z"/><rect x="16" y="24" width="38" height="22" rx="4" fill="#b77736" stroke="#3a1c09" stroke-width="3"/><rect x="60" y="25" width="38" height="20" rx="4" fill="#b77736" stroke="#3a1c09" stroke-width="3"/></g>
  <g transform="translate(203,690)"><path class="shoe ink" d="M0 25 C34 8 88 14 112 42 C92 70 30 72 4 50z"/><path class="sole" d="M4 50 C32 64 90 62 112 42 L116 58 C84 82 24 80 0 57z"/><rect x="16" y="24" width="38" height="22" rx="4" fill="#b77736" stroke="#3a1c09" stroke-width="3"/><rect x="60" y="25" width="38" height="20" rx="4" fill="#b77736" stroke="#3a1c09" stroke-width="3"/></g>
